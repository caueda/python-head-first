{% extends 'base.html' %}

{% block body %}
<h2>{{ the_title }}</h2>

<table style="width:100%; border: 1px solid black">
    <tr>
        {% for row_title in the_row_titles %}
        <th style="border: 1px solid black">{{ row_title }}</th>
        {% endfor %}
    </tr>
    {% for log_row in the_data %}
    <tr>
        {% for item in log_row %}
        <td style="border: 1px solid black">{{ item }}</td>
        {% endfor %}
    </tr>
    {% endfor %}
</table>
{% endblock %}
